server:
  port: 8585
  servlet:
    context-path: /idea

spring:

  datasource:
    driver-class-name: org.h2.Driver
    #    url: jdbc:h2:mem:recapdb
    url: jdbc:h2:file:~/databaseH2/ideadb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password:
  #    initialization-mode: always

  thymeleaf:
    cache: false
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  jpa:
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
#
logging:
  level:
    root: INFO
    be.ipeters.thinkmaven: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: ERROR